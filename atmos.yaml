commands:
- name: readme
  steps:
    - "atmos docs generate readme"
    - "atmos docs generate readme-submodule-child-organization"
    - "atmos docs generate readme-submodule-monitors"
    - "atmos docs generate readme-submodule-organization-settings"
    - "atmos docs generate readme-submodule-permissions"
    - "atmos docs generate readme-submodule-roles"
    - "atmos docs generate readme-submodule-slo"
    - "atmos docs generate readme-submodule-synthetics"

- name: test
  commands:
  - name: "init"
    description: Initialize tests
    steps:
      - "make -C test/src init"

  - name: "run"
    description: Run tests
    steps:
      - "cd test/src && go mod tidy"
      - "cd test/src && go test -v -timeout 60m"

  - name: "clean"
    description: Clean tests
    steps:
      - "make -C test/src clean"
      - "rm -rf examples/*/.terraform examples/*/.terraform.lock.hcl"
