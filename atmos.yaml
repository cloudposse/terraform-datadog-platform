# Atmos Configuration — powered by https://atmos.tools
#
# This configuration enables centralized, DRY, and consistent project scaffolding using Atmos.
#
# Included features:
# - Organizational custom commands: https://atmos.tools/core-concepts/custom-commands
# - Automated README generation: https://atmos.tools/cli/commands/docs/generate
#

# Import shared configuration used by all modules
import:
  - https://raw.githubusercontent.com/cloudposse/.github/refs/heads/main/.github/atmos/terraform-module.yaml

docs:
  generate:
    readme-submodule-child-organization:
      base-dir: ./
      input:
        - readme: "./modules/child_organization/README.md"
        - get_support: true
      template: "https://raw.githubusercontent.com/cloudposse/.github/refs/heads/main/atmos.README.md.submodule.gotmpl"
      output: "./modules/child_organization/README.md"
      terraform:
        source: ./modules/child_organization
        enabled: true
        format: "markdown table"
        show_providers: false
        show_inputs: true
        show_outputs: true
        sort_by: "name"
        hide_empty: false
        indent_level: 2

    readme-submodule-monitors:
      base-dir: ./
      input:
        - readme: "./modules/monitors/README.md"
        - get_support: true
      template: "https://raw.githubusercontent.com/cloudposse/.github/refs/heads/main/atmos.README.md.submodule.gotmpl"
      output: "./modules/monitors/README.md"
      terraform:
        source: ./modules/monitors
        enabled: true
        format: "markdown table"
        show_providers: false
        show_inputs: true
        show_outputs: true
        sort_by: "name"
        hide_empty: false
        indent_level: 2

    readme-submodule-organization-settings:
